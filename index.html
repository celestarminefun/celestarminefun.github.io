<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Celestar — Mod Menu for MineFun</title>
  <meta name="description" content="Celestar Mod Menu — A MineFun add-on, making your MineFun experience better." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <canvas id="particle-canvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="noise-overlay"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="celestar-wrapper">
    <section class="hero">

      <!--
        ⚠️ LOGO: Update the src below to match the actual logo filename
           in the img/ folder. For example:
           src="img/logo.png" or src="img/logo.png" etc.
      -->
      <div class="hero-logo-wrap" id="logoWrap">
        <div class="hero-logo-ring"></div>
        <img class="hero-logo" id="heroLogo" src="img/logo.png" alt="Celestar Logo" />
      </div>

      <div style="position:relative; display:inline-block;">
        <div class="hero-title-glow"></div>
        <h1 class="hero-title">
          <span class="title-text">CELESTAR</span>
          <span class="title-shine" aria-hidden="true">CELESTAR</span>
        </h1>
      </div>

      <p class="hero-subtitle">Celestar Mod Menu</p>
      <p class="hero-description">A MineFun add-on, making your MineFun experience better.</p>

      <div class="hero-buttons">
        <a class="btn-download" id="btnDownload" href="mods/installation/modmenu.user.js">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </span>
          Download the mod menu now!
        </a>
        <!--
          ⚠️ DISCORD: Update the href below to the actual Discord invite
             link from the original index.html
        -->
        <a class="btn-discord" id="btnDiscord" href="https://discord.gg/qPefeST9Us" target="_blank" rel="noopener noreferrer">
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
          </span>
          Connect with us on Discord!
        </a>
      </div>
    </section>

    <footer class="celestar-footer">
      <p>Made with <span class="heart">&#10084;</span> by thetalkingcat</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
