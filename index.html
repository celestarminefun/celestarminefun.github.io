<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Celestar</title>

<link rel="stylesheet" href="css/index.css">
<link rel="stylesheet" href="css/mods.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<div class="navbar">
    <img src="img/logo.png">

    <button id="homeBtn" class="navbtn active">Home</button>
    <button id="modsBtn" class="navbtn">Mods</button>
</div>

<div class="container">

    <div id="homePage" class="page active">
    <div class="home">
    <h1 class="gradient-text">Celestar</h1>
    <p class="subtitle">Making your MineFun experience better</p>
    </div>
    </div>

    <div id="modsPage" class="page">
        <div class="mods-page">
            <div class="mods-toolbar">
    <div class="search-wrapper">
        <i class="fas fa-magnifying-glass search-icon"></i>
        <input type="text" id="search" placeholder="Search">
    </div>
    <div class="filter-tags">
        <button class="filter-btn active" data-filter="all">
            <i class="fas fa-list"></i> All
        </button>
        <button class="filter-btn" data-filter="ui">
            <i class="fas fa-palette"></i> UI
        </button>
    </div>
</div>
            <div class="mods-grid" id="modsGrid"></div>
        </div>
    </div>
</div>

<script src="js/page.js"></script>
<script src="js/mods.js"></script>

</body>
</html>
